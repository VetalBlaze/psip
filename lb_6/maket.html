<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Фиксированный макет в пикселях</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

    <!-- Блок 1 -->
    <div class="header bg-1-2"><b>1</b></div>

    <!-- Верхняя часть -->
    <div class="section">

        <!-- Блок 3 -->
        <div class="left-block bg-3"><b>3</b></div>

        <!-- Правая часть -->
        <div class="right-block">

            <div class="top-row">
                <div class="block-5 bg-5"><b>5</b></div>
                <div class="block-6 bg-6"><b>6</b></div>
            </div>

            <div class="bottom-row bg-7">
                <b>7</b>
            </div>

        </div>
    </div>

    <!-- Нижняя часть -->
    <div class="section">

        <!-- Блок 4 -->
        <div class="left-block bg-4"><b>4</b></div>

        <!-- Правая часть -->
        <div class="right-block">

            <div class="top-row">
                <div class="block-8 bg-8"><b>8</b></div>
                <div class="block-9 bg-9"><b>9</b></div>
            </div>

            <div class="bottom-row bg-10">
                <b>10</b>
            </div>

        </div>
    </div>

    <!-- Блок 2 -->
    <div class="footer bg-1-2"><b>2</b></div>

</div>

</body>
</html>
