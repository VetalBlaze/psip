<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Задание 1</title>
    <script>
        function showMinutes() {
            let now = new Date();
            let minutes = now.getMinutes();
            alert("Текущее количество минут в часе: " + minutes);
        }
    </script>
</head>
<body>
    <button onclick="showMinutes()">Показать минуты</button>
</body>
</html>
