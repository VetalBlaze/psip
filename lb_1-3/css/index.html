<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Самостоятельная работа CSS</title>

    <!-- ===== СПОСОБ 1 (№3 по таблице) ===== -->
    <!-- Внутренняя таблица стилей -->
    <style>
        /* Вид селектора: тег body */

        body {
            background-color: yellow; /* цвет фона */
            font-family: Calibri;      /* шрифт */
            font-size: 14pt;           /* размер шрифта */
            color: red;                /* цвет текста */
        }
    </style>

    <!-- ===== СПОСОБ 4 (№4 по таблице) ===== -->
    <!-- Импорт таблицы стилей -->
    <style>
        @import url("import.css");
    </style>

    <!-- ===== СПОСОБ 1 (№1 по таблице) ===== -->
    <!-- Внешний файл стилей -->
    <link rel="stylesheet" href="styles.css">

</head>

<body>
    <p>Романчук Виталий Леонидович</p>

    <!-- ===== СПОСОБ 2 (№2 по таблице) ===== -->
    <!-- Внутритеговый стиль (inline) -->
    <h6 style="
        text-decoration: underline;
        color: red;
        text-align: right;
    ">
        Дата рождения: 21.06.2007
    </h6>

    <!-- Селектор-класс -->
    <div class="birthplace">
        Место рождения: г. Гродно
    </div>


</body>
</html>
